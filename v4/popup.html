<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="tailwind.css" rel="stylesheet">
  <style>
    body { width: 320px; background-color: #0f172a; color: white; margin: 0; }
    .toggle-checkbox:checked { right: 0; border-color: #3b82f6; }
    .toggle-checkbox:checked + .toggle-label { background-color: #3b82f6; }
  </style>
</head>
<body class="font-sans antialiased p-5">
  <div class="border-b border-gray-700 pb-4 mb-5 text-center">
    <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">LMS Reborn</h1>
    <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Control Panel</p>
  </div>

  <div class="flex items-center justify-between bg-gray-800 p-3 rounded-xl border border-gray-700 shadow-inner mb-5">
    <span class="font-medium text-sm text-gray-200">Dark Mode</span>
    <div class="relative inline-block w-10 mr-2 align-middle select-none">
      <input type="checkbox" id="toggleDark" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-gray-900 border-4 appearance-none cursor-pointer transition-transform duration-200"/>
      <label for="toggleDark" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-600 cursor-pointer"></label>
    </div>
  </div>

  <button id="applyBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg text-sm mb-5">
    Terapkan Tema
  </button>

  <div class="text-center text-xs text-gray-500 pt-3 border-t border-gray-800">
    Designed & Developed by <br>
    <a href="https://www.rizuku.my.id/" target="_blank" class="text-blue-400 hover:text-blue-300 font-bold mt-1 inline-block">RizukiDesz.</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
